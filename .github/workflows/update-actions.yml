name: Update GitHub Actions

on:
  schedule:
    - cron: '0 9 * * 1'  # 每周一 09:00 (UTC+8)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  outdated-actions:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 查找过时的 actions
        id: find
        run: |
          echo "Checking for outdated GitHub Actions..."

          echo "outdated=$(grep -E "^[[:space:]]*uses: actions/" .github/workflows/*.yml | grep -v "update-actions.yml" | sed 's/.*: *uses: actions\/\([^@]*\)@\(.*\)/{"action":"\1","version":"\2"}/' | jq -c -s '.' 2>/dev/null || echo '[]')" >> $GITHUB_OUTPUT

      - name: 检测并生成报告
        if: steps.find.outputs.outdated != '[]' && steps.find.outputs.outdated != ''
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const outdatedStr = `${{ steps.find.outputs.outdated }}`;

            if (!outdatedStr || outdatedStr === '[]') {
              console.log('所有 GitHub Actions 都已是最新版本');
              return;
            }

            let outdatedActions;
            try {
              outdatedActions = JSON.parse(outdatedStr);
            } catch (e) {
              console.log('解析 actions 列表失败:', e.message);
              return;
            }

            if (!Array.isArray(outdatedActions) || outdatedActions.length === 0) {
              console.log('所有 GitHub Actions 都已是最新版本');
              return;
            }

            const results = [];

            for (const item of outdatedActions) {
              try {
                const response = await github.rest.repos.getLatestRelease({
                  owner: 'actions',
                  repo: item.action
                });

                const latestVersion = response.data.tag_name.replace(/^v/, '');

                if (item.version !== latestVersion) {
                  results.push({
                    action: item.action,
                    current: item.version,
                    latest: latestVersion
                  });
                }
              } catch (e) {
                console.log(`获取 ${item.action} 最新版本失败:`, e.message);
              }
            }

            if (results.length === 0) {
              console.log('所有 GitHub Actions 都已是最新版本');
              return;
            }

            // 生成 Markdown 报告
            let report = '## GitHub Actions 更新报告\n\n';
            report += '检测到以下 actions 有可用更新：\n\n';
            report += '| Action | 当前版本 | 最新版本 |\n';
            report += '|--------|----------|----------|\n';

            for (const r of results) {
              report += `| ${r.action} | ${r.current} | ${r.latest} |\n`;
            }

            report += '\n---\n\n';
            report += '### 更新步骤\n\n';
            report += '1. 手动更新 `.github/workflows/` 目录下的 workflow 文件中的版本号\n';
            report += '2. 提交更改\n\n';
            report += '```bash\n';
            for (const r of results) {
              report += `# 更新 ${r.action}\nsed -i 's/actions\\/${r.action}@${r.current}/actions\\/${r.action}@${r.latest}/g' .github/workflows/*.yml\n`;
            }
            report += '# 提交\ngit add .github/workflows/*.yml\ngit commit -m "ci: 更新 GitHub Actions 版本"\ngit push\n';
            report += '```\n';

            // 写入 workflow summary
            const summaryPath = process.env.GITHUB_STEP_SUMMARY;
            if (summaryPath) {
              const fs = require('fs');
              fs.writeFileSync(summaryPath, report);
            }

            console.log(`检测到 ${results.length} 个需要更新的 actions，已生成更新报告`);
