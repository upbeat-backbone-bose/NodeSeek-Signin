name: Build and Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      docker_tags:
        description: 'Docker 镜像标签（多个用逗号分隔）'
        required: false
        default: 'test'
        type: string
      push_image:
        description: '是否推送到远程仓库'
        required: false
        default: 'false'
        type: boolean
  push:
    branches:
      - 'docker-test/**'
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - '*.py'

env:
  REGISTRY: ${{ vars.DOCKERHUB_REGISTRY || 'docker.io' }}
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/nodeseek-signin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'release' || github.event.inputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=test,enable=${{ github.event.inputs.docker_tags == 'test' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'release' || github.event.inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
